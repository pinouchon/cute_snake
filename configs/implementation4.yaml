project: cute-snake
implementation: implementation4
seed: 94
device: cuda
run_root: runs
eval_episodes: 5
eval_interval: 10
eval_after_update: 90
eval_interval_after: 1
eval_recent_coverage_gate: 0.65
checkpoint_interval: 1000
success_target: 0.80
stop_on_success: true

env:
  board_size: 8
  initial_length: 3
  food_count: 1
  starvation_steps: 128
  use_cute_step_core: false
  reward_food: 1.0
  reward_death: -1.0
  reward_step: -0.01

model:
  type: cnn
  trunk_channels: [28, 56]
  hidden_dim: 224
  channels_last: true
  compile_model: true
  compile_disable_cudagraphs: true

ppo:
  num_envs: 4096
  rollout_len: 16
  minibatches: 8
  update_epochs: 2
  gamma: 0.995
  gae_lambda: 0.98
  clip_coef: 0.2
  value_coef: 0.5
  entropy_coef: 0.005
  use_value_clipping: false
  lr: 2.8e-3
  max_grad_norm: 0.35
  total_updates: 160

runtime:
  amp: true
  amp_dtype: bfloat16
  allow_tf32: false
  cudnn_benchmark: false
  console_log_interval_seconds: 10
  metrics_interval_updates: 10
  profile_interval_updates: 0
  save_latest: false
  matmul_precision: high
  compile_gae: true
  graph_learner: true
  graph_whole_learner: false
  graph_gae_pack: false
  graph_warmup_updates: 2
  graph_disable_grad_clip: true
  permutation_bank_size: 1
  static_minibatch_buffers: true

logging:
  metrics_file: metrics.jsonl
  eval_file: eval.json
  train_log: train.log
  checkpoint_dir: checkpoints
  visualization_dir: visualizations
  profiler_dir: profiler
