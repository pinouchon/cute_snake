base: configs/implementation4.yaml
sweep:
  compile_model: [true]
  compile_disable_cudagraphs: [true]
  compile_gae: [true]
  graph_learner: [true]
  graph_whole_learner: [false, true]
  graph_disable_grad_clip: [true]
  graph_gae_pack: [false]
