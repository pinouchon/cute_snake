study:
  study_name: implementation4
  storage: sqlite:///optuna/implementation4.db
  direction: minimize
  sampler: tpe
  seed: 92
  load_if_exists: true
  failure_score: 1000.0
  failure_gap_scale: 100.0
  sampler_options:
    n_startup_trials: 8
    n_ei_candidates: 48
    multivariate: true
    constant_liar: true

sweep:
  gpus: "0,1,2,3,4,5,6,7"
  workers: 8
  fixed_overrides:
    total_updates: 160
  search_space:
    learning_rate:
      type: float
      low: 0.00255
      high: 0.00305
    max_grad_norm:
      type: float
      low: 0.31
      high: 0.38
    dg_eta:
      type: float
      low: 7.6
      high: 8.6
    dg_gate_floor:
      type: float
      low: 0.085
      high: 0.115
    eval_after_update:
      type: int
      low: 68
      high: 70
    eval_recent_coverage_gate:
      type: float
      low: 0.40
      high: 0.44
