project: cute-snake
implementation: implementation3
seed: 106
device: cuda
run_root: runs
eval_episodes: 5
eval_interval: 10
checkpoint_interval: 10
success_target: 0.80
stop_on_success: true

env:
  board_size: 8
  initial_length: 3
  food_count: 1
  starvation_steps: 128
  use_cute_step_core: false
  reward_food: 1.0
  reward_death: -1.0
  reward_step: -0.01

model:
  type: axial
  trunk_channels: [24, 48]
  hidden_dim: 128
  transformer_layers: 2
  transformer_heads: 4
  compile_model: false

ppo:
  num_envs: 4096
  rollout_len: 16
  minibatches: 4
  update_epochs: 2
  gamma: 0.995
  gae_lambda: 0.98
  clip_coef: 0.2
  value_coef: 0.5
  entropy_coef: 0.005
  use_value_clipping: true
  lr: 2.0e-3
  max_grad_norm: 0.5
  total_updates: 200

runtime:
  amp: true
  console_log_interval_seconds: 10
  profile_interval_updates: 0
  save_latest: false
  matmul_precision: high

logging:
  metrics_file: metrics.jsonl
  eval_file: eval.json
  train_log: train.log
  checkpoint_dir: checkpoints
  visualization_dir: visualizations
  profiler_dir: profiler
